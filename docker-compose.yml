# Self-hosted LINE Harness: backend (Node) + PostgreSQL + MinIO.
#
# Quickstart (full guide: docs/DOCKER.md):
#   cp .env.example .env   # set POSTGRES_PASSWORD, LINE_*, API_KEY, S3 keys
#   docker compose up -d --build
#
# The backend applies schema migrations on boot (idempotent) and listens on
# ${BACKEND_PORT:-8787}. Put a TLS reverse proxy (Caddy/nginx) in front —
# LINE webhooks require valid HTTPS (docs/DOCKER.md has a Caddy example).
#
# MinIO speaks the S3 API; the backend reaches it via S3_ENDPOINT/S3_BUCKET/
# S3_ACCESS_KEY/S3_SECRET_KEY (see .env.example). minio-init creates the bucket
# on boot so a fresh volume is immediately usable. The named volumes are the
# only durability boundary — back up pgdata and minio-data together.

services:
  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # In-network hosts override the localhost values .env carries for
      # host-run dev (pnpm --filter worker start:node).
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-linecrm}
      S3_ENDPOINT: http://minio:9000
    ports:
      - '${BACKEND_PORT:-8787}:8787'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-linecrm}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-linecrm}']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: wait for MinIO, then create the bucket (idempotent).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-line-harness-images} &&
      echo 'bucket ready: ${S3_BUCKET:-line-harness-images}'
      "
    restart: "no"

volumes:
  pgdata:
  minio-data:
