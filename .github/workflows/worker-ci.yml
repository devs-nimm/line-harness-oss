name: Worker CI

on:
  pull_request:
    paths:
      - 'apps/worker/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/line-sdk/**'
      - 'packages/update-engine/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/worker-ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/line-sdk/**'
      - 'packages/update-engine/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/worker-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  worker-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: linecrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db --filter @line-harness/update-engine build
      - run: pnpm --filter @line-crm/db typecheck
      - run: pnpm --filter @line-crm/db test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/linecrm
      - run: pnpm --filter worker typecheck
      - run: pnpm --filter worker test
      - run: pnpm --filter worker build
        env:
          VITE_LIFF_ID: ${{ vars.VITE_LIFF_ID }}
          VITE_BOT_BASIC_ID: ${{ vars.VITE_BOT_BASIC_ID }}
          VITE_CALENDAR_CONNECTION_ID: ${{ vars.VITE_CALENDAR_CONNECTION_ID }}
